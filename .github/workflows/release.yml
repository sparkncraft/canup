# Publishes `canup` to npm via Changesets + npm Trusted Publishing (OIDC).
#
# No npm token is used. Authentication happens through GitHub's OIDC token, which
# npm exchanges for a short-lived publish credential (requires `id-token: write`
# and a trusted publisher configured for this package on npmjs.com — see
# RELEASING.md). Provenance is generated automatically because this is a public
# repository.
name: Release
on:
  push:
    branches: [main]
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # No `registry-url`: it writes an .npmrc with `_authToken=${NODE_AUTH_TOKEN}`
          # that npm prefers over the OIDC token exchange, breaking trusted publishing.
      # Runners bundle an older npm; trusted publishing needs npm >= 11.5.1, and
      # pnpm delegates the publish + OIDC exchange to the npm CLI.
      - name: Use npm >= 11.5.1
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
