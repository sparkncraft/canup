# Publishes @canup/ui and @canup/cli to npm via npm Trusted Publishing (OIDC).
#
# Manual trigger. Bump the package versions on main first (they version in
# lockstep), then run this workflow from the Actions tab.
#
# No npm token is used: authentication is GitHub's OIDC token, which npm
# exchanges for a short-lived publish credential (requires `id-token: write` and
# a trusted publisher configured for each package on npmjs.com — see
# RELEASING.md). Provenance is generated automatically because this is a public
# repository.
#
# npm OIDC cannot bootstrap a brand-new package name: the first publish of each
# package must be a manual `npm publish` (with your npm 2FA). This workflow takes
# over for every release after that.
name: Release
on:
  workflow_dispatch:
concurrency: ${{ github.workflow }}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # No `registry-url`: it writes an .npmrc with `_authToken=${NODE_AUTH_TOKEN}`
          # that npm prefers over the OIDC token exchange, breaking trusted publishing.
      # Runners bundle an older npm; trusted publishing needs npm >= 11.5.1, and
      # pnpm delegates the publish + OIDC exchange to the npm CLI.
      - name: Use npm >= 11.5.1
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm --filter "./packages/*" publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
